services:
  - type: web
    name: discordv2
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: python -m gunicorn config.asgi:application -k uvicorn.workers.UvicornWorker
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: DEBUG
        value: "False"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SERVE_MEDIA
        value: "True"
      - key: MEDIA_ROOT
        value: "/opt/render/project/src/media"
      - key: DATABASE_URL
        fromDatabase:
          name: discordv2-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: discordv2-redis
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.11
  - type: keyvalue
    name: discordv2-redis
    plan: free
    ipAllowList: []

databases:
  - name: discordv2-db
    plan: free
